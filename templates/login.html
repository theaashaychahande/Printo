{% extends "base.html" %}

{% block title %}Login - Printo{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card glass">
        <h2 class="text-center mb-4">Welcome Back!</h2>
        <form method="POST">
            <div class="form-group">
                <label for="email">Email ID</label>
                <input type="email" id="email" name="email" placeholder="College or Personal Email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        <div class="text-center mt-4">
            <p class="text-sm text-light">Don't have an account? <a href="{{ url_for('register') }}"
                    style="color: var(--primary); font-weight: 600;">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
