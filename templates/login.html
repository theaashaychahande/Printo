{% extends "base.html" %}

{% block title %}Login - Printo{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card glass">
        <h2 class="text-center mb-4">Welcome Back! <small style="font-size: 1.2rem;">👋</small></h2>
        <form method="POST">
            <div class="form-group">
                <label for="email">Enter your Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password (Optional for testing)</label>
                <input type="password" id="password" name="password" placeholder="••••••••">
                <small class="text-light text-sm">Leave blank for OTP login</small>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        <div class="text-center mt-4">
            <p class="text-sm text-light">Don't have an account? <a href="{{ url_for('register') }}"
                    style="color: var(--primary); font-weight: 600;">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
