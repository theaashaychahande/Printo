{% extends "base.html" %}

{% block title %}Verify OTP - Printo{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card glass">
        <h2 class="text-center mb-4">Verify Your Email <small style="font-size: 1.2rem;">📧</small></h2>
        <p class="text-sm text-light text-center mb-4">We've sent a 6-digit code to <strong>{{ email }}</strong></p>

        <form method="POST">
            <div class="form-group">
                <label for="otp">Enter 6-digit Code</label>
                <input type="text" id="otp" name="otp" placeholder="123456" pattern="\d{6}" maxlength="6" required
                    style="letter-spacing: 0.5rem; text-align: center; font-size: 1.5rem; font-weight: 800;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Verify & Continue</button>
        </form>

        <div class="text-center mt-4">
            <p class="text-sm text-light">Didn't get the code? <a href="{{ url_for('login') }}"
                    style="color: var(--primary); font-weight: 600;">Resend OTP</a></p>
        </div>
    </div>
</div>
{% endblock %}
