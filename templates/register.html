{% extends "base.html" %}

{% block title %}Register - Printo{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card glass">
        <h2 class="text-center mb-4">Create Account</h2>
        <form method="POST">
            <div class="form-group">
                <label for="email">Enter your Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Send Signup OTP</button>
        </form>
        <div class="text-center mt-4">
            <p class="text-sm text-light">Already have an account? <a href="{{ url_for('login') }}"
                    style="color: var(--primary); font-weight: 600;">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
