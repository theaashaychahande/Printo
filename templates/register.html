{% extends "base.html" %}

{% block title %}Register - Printo{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 2rem auto;">
    <div class="card glass">
        <h2 class="text-center mb-4">Create Account</h2>
        <form method="POST">
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="college_email">College Email ID</label>
                <input type="email" id="college_email" name="college_email" placeholder="student@college.edu" required>
            </div>
            <div class="form-group">
                <label for="personal_email">Personal Email ID</label>
                <input type="email" id="personal_email" name="personal_email" placeholder="you@gmail.com" required>
            </div>
            <div class="form-group">
                <label for="password">Create Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <ul class="text-sm text-light mt-2" style="padding-left: 1.2rem;">
                    <li>At least <strong>8 characters</strong> long</li>
                    <li>Contains at least one <strong>uppercase</strong> letter</li>
                    <li>Contains at least one <strong>special character</strong></li>
                </ul>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
        </form>
        <div class="text-center mt-4">
            <p class="text-sm text-light">Already have an account? <a href="{{ url_for('login') }}"
                    style="color: var(--primary); font-weight: 600;">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
